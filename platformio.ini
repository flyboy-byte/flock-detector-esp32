; Shared settings inherited by all targets
[common]
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
build_flags =
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -I firmware

; ── Targets ──────────────────────────────────────────────────────────────────

[env:xiao_esp32s3]
extends = common
platform = espressif32
board = seeed_xiao_esp32s3
board_build.partitions = huge_app.csv
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram_type = opi
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_BUZZER_PIN=3
    -DBOARD_HAS_5GHZ=1

; ESP32-WROOM-32 (4MB flash, no PSRAM, 2.4GHz only)
[env:esp32_wroom]
extends = common
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${common.build_flags}
    -DBOARD_BUZZER_PIN=25
    -DBOARD_HAS_5GHZ=0

; ESP32-WROVER (4MB flash + 4MB PSRAM, 2.4GHz only)
[env:esp32_wrover]
extends = common
platform = espressif32
board = esp32wrover
board_build.partitions = min_spiffs.csv
build_flags =
    ${common.build_flags}
    -DBOARD_BUZZER_PIN=25
    -DBOARD_HAS_5GHZ=0
    -DBOARD_HAS_PSRAM=1
